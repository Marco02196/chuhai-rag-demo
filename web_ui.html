<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>出海投放 AI 军师</title>
<style>
:root{
  --b200:#BFDBFE;--b300:#93C5FD;--b400:#60A5FA;
  --b500:#3B82F6;--b600:#2563EB;--b700:#1D4ED8;
  --i900:#0C1E35;--i700:#1E3A55;--i500:#4A6580;
  --i400:#6B85A0;--i300:#9AAFC5;--i100:#EAF2FC;
  --teal:#0D9488;--teal-bg:rgba(13,148,136,.1);--teal-r:rgba(13,148,136,.28);
  --red:#DC2626;--red-bg:rgba(220,38,38,.08);
  --gl:rgba(255,255,255,.65);--gl-s:rgba(255,255,255,.82);
  --gb:rgba(255,255,255,.68);--gb-blue:rgba(147,197,253,.4);
  --sh:0 4px 24px rgba(37,99,235,.10),0 1px 4px rgba(12,30,53,.05);
  --sh-lg:0 16px 56px rgba(37,99,235,.14),0 4px 12px rgba(12,30,53,.07);
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Segoe UI',sans-serif;
  --mono:'SF Mono','JetBrains Mono',Consolas,monospace;
  --eout:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--sans);color:var(--i900);
  background:
    radial-gradient(ellipse 1000px 600px at 15% -5%,rgba(147,197,253,.45),transparent 65%),
    radial-gradient(ellipse 800px 700px at 88% 8%,rgba(191,219,254,.55),transparent 60%),
    radial-gradient(ellipse 900px 500px at 50% 115%,rgba(219,234,254,.75),transparent 55%),
    linear-gradient(170deg,#F2F8FF 0%,#E8F1FD 100%);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* ambient glow */
body::before,body::after{
  content:'';position:fixed;border-radius:50%;
  filter:blur(90px);pointer-events:none;z-index:0;
}
body::before{
  width:480px;height:480px;top:-160px;left:-100px;
  background:radial-gradient(circle,rgba(96,165,250,.22),transparent 70%);
}
body::after{
  width:420px;height:420px;bottom:-130px;right:-90px;
  background:radial-gradient(circle,rgba(147,197,253,.28),transparent 70%);
}

/* ── GATE ── */
.gate{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,rgba(191,219,254,.65),rgba(239,246,255,.72));
  backdrop-filter:blur(10px);
  animation:fadein .28s ease both;
}
.gate.hidden{display:none;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.gate-box{
  width:100%;max-width:360px;
  background:var(--gl-s);
  backdrop-filter:blur(28px) saturate(180%);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:var(--sh-lg);
  border-radius:var(--r24);
  padding:32px 26px;
  animation:popin .36s var(--eout) both;
}
@keyframes popin{from{opacity:0;transform:scale(.93) translateY(14px)}to{opacity:1;transform:none}}
.gate-mark{
  width:44px;height:44px;border-radius:13px;margin-bottom:18px;
  background:linear-gradient(145deg,var(--b400),var(--b700));
  display:flex;align-items:center;justify-content:center;
  font:700 13px/1 var(--mono);color:#fff;
  box-shadow:0 6px 18px rgba(37,99,235,.34),inset 0 1px 0 rgba(255,255,255,.22);
}
.gate-box h2{font-size:17px;font-weight:800;color:var(--i900);margin-bottom:4px;}
.gate-box p{font-size:12.5px;color:var(--i500);line-height:1.65;margin-bottom:20px;}
.gate-box input{
  width:100%;background:rgba(255,255,255,.78);
  border:1px solid var(--gb-blue);border-radius:var(--r12);
  padding:12px 14px;color:var(--i900);
  font-size:14px;font-family:var(--mono);letter-spacing:.1em;
  margin-bottom:8px;
  transition:border-color .18s,box-shadow .18s;
}
.gate-box input:focus{outline:none;border-color:var(--b400);box-shadow:0 0 0 4px rgba(96,165,250,.15);}
.gate-err{font-size:12px;color:var(--red);min-height:18px;margin-bottom:8px;}
.gate-btn{
  width:100%;background:linear-gradient(135deg,var(--b400),var(--b600));
  border:none;border-radius:var(--r12);padding:13px;
  color:#fff;font-weight:700;font-size:14px;cursor:pointer;
  box-shadow:0 6px 18px rgba(37,99,235,.32),inset 0 1px 0 rgba(255,255,255,.18);
  transition:transform .18s var(--eout),box-shadow .18s;
}
.gate-btn:hover{transform:translateY(-1px);box-shadow:0 9px 24px rgba(37,99,235,.38),inset 0 1px 0 rgba(255,255,255,.18);}
.gate-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.gate-hint{font-size:11px;color:var(--i300);margin-top:12px;text-align:center;}

/* ── SHELL: single centered column ── */
.shell{
  position:relative;z-index:1;
  max-width:740px;margin:0 auto;
  display:flex;flex-direction:column;
  height:100vh;
  padding:0 16px;
}

/* ── HEADER (minimal) ── */
.hdr{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0 12px;
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-mark{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(145deg,var(--b400),var(--b700));
  display:flex;align-items:center;justify-content:center;
  font:700 11px/1 var(--mono);color:#fff;
  box-shadow:0 3px 10px rgba(37,99,235,.3),inset 0 1px 0 rgba(255,255,255,.2);
}
.hdr-name{font-size:14px;font-weight:700;color:var(--i900);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.sess-pill{
  display:flex;align-items:center;gap:5px;
  background:var(--teal-bg);border:1px solid var(--teal-r);
  border-radius:999px;padding:4px 11px;
  font-size:10.5px;color:var(--teal);font-family:var(--mono);
}
.sess-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);}
/* settings trigger */
.settings-btn{
  width:30px;height:30px;border-radius:var(--r8);
  border:1px solid var(--gb-blue);background:var(--gl);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;color:var(--i400);
  transition:.15s;
}
.settings-btn:hover{background:rgba(255,255,255,.85);color:var(--b600);}

/* ── CHAT AREA ── */
.chat-area{
  flex:1;overflow-y:auto;
  padding:8px 0 12px;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:3px;}
.chat-area::-webkit-scrollbar-thumb{background:var(--gb-blue);border-radius:3px;}

/* empty state */
.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;
  min-height:55vh;text-align:center;
}
.empty-icon{
  font-size:36px;
  animation:float 4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.empty-title{font-size:22px;font-weight:800;color:var(--i900);}
.empty-sub{font-size:13px;color:var(--i400);line-height:1.6;}
.quick-chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.qchip{
  font-size:12px;color:var(--b600);
  background:rgba(255,255,255,.6);border:1px solid var(--gb-blue);
  border-radius:999px;padding:6px 14px;cursor:pointer;
  backdrop-filter:blur(8px);
  transition:.15s;
}
.qchip:hover{background:rgba(96,165,250,.12);border-color:var(--b400);}

/* messages */
.msg{margin-bottom:24px;animation:msgin .3s var(--eout) both;}
@keyframes msgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* user bubble — right aligned */
.msg-user{display:flex;justify-content:flex-end;}
.bubble-user{
  max-width:78%;
  background:linear-gradient(135deg,rgba(96,165,250,.18),rgba(191,219,254,.26));
  border:1px solid rgba(96,165,250,.35);
  border-radius:18px 18px 4px 18px;
  padding:11px 16px;font-size:14px;color:var(--i900);
  box-shadow:0 2px 8px rgba(37,99,235,.07);
}

/* ai answer — left, no card */
.msg-ai{display:flex;gap:10px;align-items:flex-start;}
.ai-dot{
  width:26px;height:26px;border-radius:8px;flex-shrink:0;margin-top:3px;
  background:linear-gradient(145deg,var(--b400),var(--b700));
  display:flex;align-items:center;justify-content:center;
  font:700 9px/1 var(--mono);color:#fff;
  box-shadow:0 3px 9px rgba(37,99,235,.28),inset 0 1px 0 rgba(255,255,255,.18);
}
.ai-content{flex:1;min-width:0;}
.ai-label{font-size:10.5px;color:var(--i300);font-family:var(--mono);margin-bottom:7px;}
.ai-text{font-size:15px;color:var(--i700);line-height:1.85;}
.ai-text{
  white-space:pre-wrap;
  word-break:break-word;
}
.ai-text strong{font-weight:750;color:var(--i900);}
.ai-text .answer-heading{
  display:block;
  margin:18px 0 8px;
  font-size:15.5px;
  line-height:1.45;
}

/* typing */
.typing{display:flex;gap:4px;align-items:center;padding:4px 0 2px;}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--b400);display:block;
  animation:tdot .9s ease-in-out infinite;}
.typing i:nth-child(2){animation-delay:.14s;}
.typing i:nth-child(3){animation-delay:.28s;}
@keyframes tdot{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(-5px);opacity:1}}

/* skeleton */
.skel{display:flex;flex-direction:column;gap:9px;padding:2px 0;}
.skel-l{height:11px;border-radius:4px;
  background:linear-gradient(90deg,rgba(191,219,254,.5) 0%,rgba(239,246,255,.9) 50%,rgba(191,219,254,.5) 100%);
  background-size:300% 100%;animation:shim 1.5s infinite;}
@keyframes shim{0%{background-position:300% 0}100%{background-position:-300% 0}}

/* sources */
.src-toggle{
  display:inline-flex;align-items:center;gap:5px;margin-top:11px;
  font-size:11.5px;color:var(--teal);
  background:var(--teal-bg);border:1px solid var(--teal-r);
  border-radius:999px;padding:4px 12px;cursor:pointer;font-family:var(--mono);
  transition:.14s;
}
.src-toggle:hover{background:rgba(13,148,136,.16);}
.src-toggle .chev{transition:transform .2s var(--eout);}
.src-toggle.open .chev{transform:rotate(90deg);}
.src-list{
  display:flex;flex-direction:column;gap:6px;
  margin-top:8px;overflow:hidden;max-height:0;
  transition:max-height .3s var(--eout);
}
.src-list.open{max-height:600px;}
.src-card{
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(12px);
  border:1px solid var(--gb-blue);border-radius:var(--r12);
  padding:9px 12px;
}
.src-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.src-cat{font-size:10.5px;color:var(--teal);font-family:var(--mono);
  background:var(--teal-bg);border:1px solid var(--teal-r);
  padding:2px 8px;border-radius:999px;}
.src-sc{font-size:10.5px;color:var(--i300);font-family:var(--mono);}
.src-text{font-size:12.5px;color:var(--i500);line-height:1.6;}

/* feedback */
.fb-row{display:flex;align-items:center;gap:6px;margin-top:10px;}
.fb-btn{
  width:26px;height:26px;border-radius:var(--r8);
  border:1px solid var(--gb-blue);background:rgba(255,255,255,.5);
  color:var(--i300);cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;transition:.14s;
}
.fb-btn:hover{transform:scale(1.1);}
.fb-btn.up{border-color:var(--teal);color:var(--teal);background:var(--teal-bg);}
.fb-btn.dn{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.fb-lbl{font-size:11px;color:var(--i300);font-family:var(--mono);}

/* ── SETTINGS DRAWER (hidden by default) ── */
.drawer-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(12,30,53,.18);backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:280px;z-index:101;
  background:rgba(240,247,255,.92);
  backdrop-filter:blur(28px) saturate(180%);
  border-left:1px solid rgba(255,255,255,.7);
  box-shadow:-8px 0 40px rgba(37,99,235,.12);
  padding:24px 20px;
  transform:translateX(100%);transition:transform .3s var(--eout);
  display:flex;flex-direction:column;gap:22px;overflow-y:auto;
}
.drawer.open{transform:none;}
.drawer-close{
  position:absolute;top:16px;right:16px;
  width:28px;height:28px;border-radius:var(--r8);
  border:1px solid var(--gb-blue);background:rgba(255,255,255,.6);
  color:var(--i400);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.dr-section-label{
  font-size:10px;font-family:var(--mono);letter-spacing:.08em;
  text-transform:uppercase;color:var(--i300);margin-bottom:9px;
  padding-bottom:6px;border-bottom:1px solid var(--gb-blue);
}
/* intent in drawer */
.dr-intent-list{display:flex;flex-direction:column;gap:5px;}
.dr-intent{
  display:flex;align-items:center;gap:9px;
  background:rgba(255,255,255,.5);border:1px solid transparent;
  border-radius:var(--r12);padding:8px 11px;cursor:pointer;
  transition:.16s;
}
.dr-intent:hover{background:rgba(255,255,255,.75);border-color:var(--gb-blue);}
.dr-intent.active{
  background:linear-gradient(135deg,rgba(96,165,250,.16),rgba(191,219,254,.22));
  border-color:rgba(96,165,250,.5);
}
.dr-intent-icon{font-size:14px;}
.dr-intent-text strong{display:block;font-size:12.5px;font-weight:600;color:var(--i700);}
.dr-intent-text span{font-size:11px;color:var(--i400);}
.dr-intent.active .dr-intent-text strong{color:var(--b700);}
/* kb chips in drawer */
.dr-chips{display:flex;flex-wrap:wrap;gap:5px;}
.dr-chip{
  font-size:11.5px;padding:5px 11px;border-radius:999px;
  border:1px solid var(--gb-blue);color:var(--i500);
  background:rgba(255,255,255,.5);cursor:pointer;transition:.14s;
}
.dr-chip.active{border-color:var(--teal);color:var(--teal);background:var(--teal-bg);font-weight:600;}
/* depth in drawer */
.dr-depth{display:flex;gap:5px;}
.dr-d{
  flex:1;padding:8px 0;text-align:center;font-size:12px;
  border:1px solid var(--gb-blue);border-radius:var(--r8);
  background:rgba(255,255,255,.5);color:var(--i500);cursor:pointer;transition:.15s;
}
.dr-d.active{
  background:linear-gradient(135deg,var(--b400),var(--b600));
  border-color:var(--b600);color:#fff;font-weight:700;
  box-shadow:0 3px 10px rgba(37,99,235,.25);
}
/* scenes in drawer */
.dr-scene-group+.dr-scene-group{margin-top:10px;}
.dr-scene-title{font-size:10px;color:var(--i300);font-family:var(--mono);margin-bottom:5px;}
.dr-scene{
  display:block;width:100%;text-align:left;
  background:none;border:none;color:var(--i500);
  font-size:12px;padding:5px 4px;cursor:pointer;border-radius:var(--r4);
  transition:.13s;
}
.dr-scene:hover{color:var(--b600);background:rgba(96,165,250,.08);padding-left:8px;}

/* ── COMPOSER ── */
.composer{
  flex-shrink:0;padding:8px 0 20px;
}
.composer-box{
  background:var(--gl-s);
  backdrop-filter:blur(24px) saturate(180%);
  border:1px solid var(--gb-blue);
  border-radius:var(--r20);
  padding:14px 14px 10px;
  box-shadow:var(--sh);
  transition:border-color .2s,box-shadow .2s;
}
.composer-box:focus-within{
  border-color:rgba(96,165,250,.65);
  box-shadow:0 0 0 4px rgba(96,165,250,.11),var(--sh);
}
.composer-box textarea{
  width:100%;resize:none;background:none;border:none;
  color:var(--i900);font-size:14px;font-family:var(--sans);
  min-height:44px;max-height:140px;line-height:1.65;outline:none;
}
.composer-box textarea::placeholder{color:var(--i300);}
.composer-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.composer-left{display:flex;gap:6px;}
.hint-chip{
  font-size:11px;color:var(--b600);
  background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.28);
  border-radius:999px;padding:4px 10px;cursor:pointer;transition:.13s;white-space:nowrap;
}
.hint-chip:hover{background:rgba(96,165,250,.18);}
.send-btn{
  display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,var(--b400),var(--b600));
  border:none;border-radius:var(--r12);padding:9px 18px;
  color:#fff;font-weight:700;font-size:13px;cursor:pointer;
  box-shadow:0 4px 14px rgba(37,99,235,.3),inset 0 1px 0 rgba(255,255,255,.18);
  transition:transform .18s var(--eout),box-shadow .18s;
}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(37,99,235,.38),inset 0 1px 0 rgba(255,255,255,.18);}
.send-btn:active{transform:none;}
.send-btn:disabled{background:linear-gradient(135deg,var(--i300),var(--i100));box-shadow:none;cursor:not-allowed;transform:none;}
</style>
</head>
<body>

<!-- GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-mark">军师</div>
    <h2>出海投放 AI 军师</h2>
    <p>30 天出海指挥部知识库 · 私有试点<br/>请输入演示访问码以继续。</p>
    <input type="text" id="gateIn" placeholder="演示访问码" autocomplete="off"/>
    <div class="gate-err" id="gateErr"></div>
    <button class="gate-btn" id="gateSub">进入诊断台 →</button>
    <div class="gate-hint">支持 ?code=xxxx 直链跳过此步</div>
  </div>
</div>

<!-- SETTINGS DRAWER -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" id="drawerClose">✕</button>

  <div>
    <div class="dr-section-label">诊断类型</div>
    <div class="dr-intent-list" id="drIntentList">
      <button class="dr-intent active" data-intent="综合诊断"><span class="dr-intent-icon">🔍</span><div class="dr-intent-text"><strong>综合诊断</strong><span>不确定时先选这个</span></div></button>
      <button class="dr-intent" data-intent="投放决策"><span class="dr-intent-icon">📊</span><div class="dr-intent-text"><strong>投放决策</strong><span>预算、ROI、人群</span></div></button>
      <button class="dr-intent" data-intent="素材文案"><span class="dr-intent-icon">✍️</span><div class="dr-intent-text"><strong>素材文案</strong><span>Hook、脚本、疲劳</span></div></button>
      <button class="dr-intent" data-intent="数据回传"><span class="dr-intent-icon">⚙️</span><div class="dr-intent-text"><strong>数据回传</strong><span>Pixel、CAPI</span></div></button>
      <button class="dr-intent" data-intent="止损风控"><span class="dr-intent-icon">🛡️</span><div class="dr-intent-text"><strong>止损风控</strong><span>空烧、封控</span></div></button>
      <button class="dr-intent" data-intent="复盘归因"><span class="dr-intent-icon">📋</span><div class="dr-intent-text"><strong>复盘归因</strong><span>亏损定位复盘</span></div></button>
    </div>
  </div>

  <div>
    <div class="dr-section-label">知识库范围</div>
    <div class="dr-chips" id="drKbChips">
      <button class="dr-chip active" data-kb="全部">全部</button>
      <button class="dr-chip" data-kb="投放策略">投放策略</button>
      <button class="dr-chip" data-kb="素材文案">素材文案</button>
      <button class="dr-chip" data-kb="技术落地">技术落地</button>
      <button class="dr-chip" data-kb="风控踩坑">风控踩坑</button>
      <button class="dr-chip" data-kb="复盘案例">复盘案例</button>
    </div>
  </div>

  <div>
    <div class="dr-section-label">回答深度</div>
    <div class="dr-depth" id="drDepth">
      <button class="dr-d" data-depth="快速">快速</button>
      <button class="dr-d active" data-depth="标准">标准</button>
      <button class="dr-d" data-depth="深入">深入</button>
    </div>
  </div>

  <div>
    <div class="dr-section-label">场景入口</div>
    <div class="dr-scene-group">
      <div class="dr-scene-title">投放策略</div>
      <button class="dr-scene">烧钱没单怎么办？</button>
      <button class="dr-scene">ROI 低：关停还是降预算？</button>
      <button class="dr-scene">CTR 高但 CVR 低怎么排查？</button>
      <button class="dr-scene">漏斗人群排除怎么做？</button>
    </div>
    <div class="dr-scene-group">
      <div class="dr-scene-title">素材文案</div>
      <button class="dr-scene">FB 爆款文案五步法</button>
      <button class="dr-scene">Hook 如何改得更抓人？</button>
      <button class="dr-scene">素材疲劳看哪些信号？</button>
    </div>
    <div class="dr-scene-group">
      <div class="dr-scene-title">技术 & 风控</div>
      <button class="dr-scene">Pixel/CAPI 回传怎么配置？</button>
      <button class="dr-scene">半夜空烧怎么拦截？</button>
      <button class="dr-scene">亏损复盘怎么归因？</button>
    </div>
  </div>

</div>

<!-- MAIN -->
<div class="shell">

  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-mark">军师</div>
      <div class="hdr-name">出海投放 AI 军师</div>
    </div>
    <div class="hdr-right">
      <div class="sess-pill" id="sessPill"><span class="sess-dot"></span>已验证</div>
      <button class="settings-btn" id="settingsBtn" title="诊断设置">⚙︎</button>
    </div>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="empty" id="emptyState">
      <div class="empty-icon">🧠</div>
      <div class="empty-title">出海投放 AI 军师</div>
      <div class="empty-sub">433 个知识片段 · 来源可追溯 · DeepSeek RAG</div>
      <div class="quick-chips">
        <button class="qchip" data-q="烧钱没单怎么办？">烧钱没单</button>
        <button class="qchip" data-q="ROI 低：关停还是降预算？">ROI 下滑</button>
        <button class="qchip" data-q="素材疲劳看哪些信号？">素材疲劳</button>
        <button class="qchip" data-q="半夜空烧怎么拦截？">空烧止损</button>
        <button class="qchip" data-q="Pixel/CAPI 回传怎么配置？">CAPI 配置</button>
      </div>
    </div>
  </div>

  <div class="composer">
    <div class="composer-box">
      <textarea id="input" placeholder="输入你的投放问题，例如：FB 投了三天没出单，预算该砍还是等？" rows="1"></textarea>
      <div class="composer-footer">
        <div class="composer-left">
          <button class="hint-chip" id="currentSettingsBtn">⚙ 综合诊断 · 标准</button>
          <button class="hint-chip" id="clearBtn">清空</button>
        </div>
        <button class="send-btn" id="sendBtn">✦ 生成建议</button>
      </div>
    </div>
  </div>

</div>

<script>
const CFG={QUERY:'/api/ask',FEEDBACK:'/api/feedback',COLD_MS:3000};
const S={intent:'综合诊断',kb:'全部',depth:'标准',token:null,lastAns:null};

const CATEGORY_BY_LABEL={
  '综合诊断':'',
  '投放决策':'ad_strategy',
  '素材文案':'creative_copy',
  '数据回传':'tech_execution',
  '止损风控':'risk_playbook',
  '复盘归因':'review_cases',
  '全部':'',
  '投放策略':'ad_strategy',
  '技术落地':'tech_execution',
  '风控踩坑':'risk_playbook',
  '复盘案例':'review_cases',
};
const DEPTH_CONFIG={
  '快速':{depth:'quick',limit:2},
  '标准':{depth:'standard',limit:3},
  '深入':{depth:'deep',limit:5},
};

/* ── GATE ── */
const gateEl=document.getElementById('gate');
const gateIn=document.getElementById('gateIn');
const gateErr=document.getElementById('gateErr');
const gateSub=document.getElementById('gateSub');
const sessPill=document.getElementById('sessPill');

function showGate(msg){gateEl.classList.remove('hidden');if(msg)gateErr.textContent=msg;}
function hideGate(){gateEl.classList.add('hidden');}

async function verify(code){
  gateSub.disabled=true;gateErr.textContent='';
  try{
    const clean=code.trim();
    if(!clean||clean.length<4)throw new Error('访问码格式不正确');
    S.token=clean;
    sessionStorage.setItem('access_code',S.token);
    hideGate();
  }catch(e){gateErr.textContent=e.message||'验证失败';}
  finally{gateSub.disabled=false;}
}
gateSub.addEventListener('click',()=>verify(gateIn.value));
gateIn.addEventListener('keydown',e=>{if(e.key==='Enter')verify(gateIn.value);});
(()=>{
  const p=new URLSearchParams(location.search).get('code');
  const saved=sessionStorage.getItem('access_code');
  if(saved){S.token=saved;hideGate();}
  else if(p){gateIn.value=p;verify(p);}
  else showGate();
})();

/* ── DRAWER ── */
const drawer=document.getElementById('drawer');
const drawerOverlay=document.getElementById('drawerOverlay');
function openDrawer(){drawer.classList.add('open');drawerOverlay.classList.add('open');}
function closeDrawer(){drawer.classList.remove('open');drawerOverlay.classList.remove('open');}
document.getElementById('settingsBtn').addEventListener('click',openDrawer);
document.getElementById('currentSettingsBtn').addEventListener('click',openDrawer);
document.getElementById('drawerClose').addEventListener('click',closeDrawer);
drawerOverlay.addEventListener('click',closeDrawer);

function updateSettingsChip(){
  document.getElementById('currentSettingsBtn').textContent=`⚙ ${S.intent} · ${S.depth}`;
}

document.getElementById('drIntentList').addEventListener('click',e=>{
  const b=e.target.closest('.dr-intent');if(!b)return;
  document.querySelectorAll('.dr-intent').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');S.intent=b.dataset.intent;updateSettingsChip();
});
document.getElementById('drKbChips').addEventListener('click',e=>{
  const c=e.target.closest('.dr-chip');if(!c)return;
  document.querySelectorAll('.dr-chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');S.kb=c.dataset.kb;
});
document.getElementById('drDepth').addEventListener('click',e=>{
  const b=e.target.closest('.dr-d');if(!b)return;
  document.querySelectorAll('.dr-d').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');S.depth=b.dataset.depth;updateSettingsChip();
});
document.querySelectorAll('.dr-scene').forEach(b=>b.addEventListener('click',()=>{
  input.value=b.textContent;input.focus();autoResize();closeDrawer();
}));

/* ── CHAT ── */
const chatArea=document.getElementById('chatArea');
const emptyState=document.getElementById('emptyState');
const input=document.getElementById('input');
const sendBtn=document.getElementById('sendBtn');

function autoResize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,140)+'px';}
input.addEventListener('input',autoResize);
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();submit();}});

document.querySelectorAll('.qchip').forEach(c=>c.addEventListener('click',()=>{
  input.value=c.dataset.q;input.focus();autoResize();
}));

function scrollBottom(){chatArea.scrollTo({top:chatArea.scrollHeight,behavior:'smooth'});}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fmtAnswer(s){
  return esc(s)
    .replace(/(^|\n)#{2,3}\s*([^\n]+)/g,'$1<strong class="answer-heading">$2</strong>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}

function appendQ(text){
  emptyState.style.display='none';
  const div=document.createElement('div');div.className='msg';
  div.innerHTML=`<div class="msg-user"><div class="bubble-user">${esc(text)}</div></div>`;
  chatArea.appendChild(div);scrollBottom();
}

function appendLoading(){
  const wrap=document.createElement('div');wrap.className='msg';
  wrap.innerHTML=`
    <div class="msg-ai">
      <div class="ai-dot">AI</div>
      <div class="ai-content">
        <div class="ai-label">军师 · ${esc(S.intent)} · ${esc(S.depth)}</div>
        <div class="typing"><i></i><i></i><i></i></div>
        <div class="skel" id="sk" style="display:none">
          <div class="skel-l" style="width:88%"></div>
          <div class="skel-l" style="width:74%"></div>
          <div class="skel-l" style="width:82%"></div>
        </div>
        <div style="display:none;font-size:11px;color:var(--i300);font-family:var(--mono);margin-top:8px" id="coldNote">知识库引擎启动中，首次请求最多等 30 秒…</div>
      </div>
    </div>`;
  chatArea.appendChild(wrap);scrollBottom();
  setTimeout(()=>{
    const t=wrap.querySelector('.typing'),sk=wrap.querySelector('#sk');
    if(t)t.style.display='none';if(sk)sk.style.display='flex';
  },1100);
  return wrap;
}

function renderAnswer(wrap,text,sources,requestId){
  const content=wrap.querySelector('.ai-content');
  const srcHtml=sources&&sources.length?`
    <button class="src-toggle"><span class="chev">›</span>&nbsp;查看 ${sources.length} 条引用来源</button>
    <div class="src-list">
      ${sources.map((s,i)=>`
        <div class="src-card" style="animation-delay:${i*.05}s">
          <div class="src-top"><span class="src-cat">${esc(s.category)}</span><span class="src-sc">相关度 ${s.score}</span></div>
          <div class="src-text">${esc(s.excerpt)}</div>
        </div>`).join('')}
    </div>`:'';
  content.innerHTML=`
    <div class="ai-label">军师 · ${esc(S.intent)} · ${esc(S.depth)}</div>
    <div class="ai-text">${fmtAnswer(text)}</div>
    ${srcHtml}
    <div class="fb-row">
      <button class="fb-btn" data-v="up">👍</button>
      <button class="fb-btn" data-v="dn">👎</button>
      <span class="fb-lbl">这条回答有帮助吗？</span>
    </div>`;
  const tog=content.querySelector('.src-toggle');
  if(tog)tog.addEventListener('click',()=>{tog.classList.toggle('open');tog.nextElementSibling.classList.toggle('open');});
  content.querySelectorAll('.fb-btn').forEach(b=>b.addEventListener('click',()=>{
    content.querySelectorAll('.fb-btn').forEach(x=>{x.classList.remove('up','dn');});
    b.classList.add(b.dataset.v);
    recordFeedback(b.dataset.v,requestId,content.querySelector('.ai-text')?.textContent||'');
  }));
  S.lastAns=content.querySelector('.ai-text');
  scrollBottom();
}

async function recordFeedback(value,requestId,answerText){
  if(!requestId||!S.token)return;
  try{
    await fetch(CFG.FEEDBACK,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.token},
      body:JSON.stringify({
        request_id:requestId,
        feedback:value==='dn'?'down':'up',
        answer_preview:answerText.slice(0,240)
      })
    });
  }catch(e){}
}

async function submit(){
  const text=input.value.trim();
  if(!text||sendBtn.disabled)return;
  if(!S.token){showGate('请先输入访问码');return;}
  appendQ(text);input.value='';autoResize();sendBtn.disabled=true;
  const loadEl=appendLoading();
  const coldT=setTimeout(()=>{const n=loadEl.querySelector('#coldNote');if(n)n.style.display='block';},CFG.COLD_MS);
  try{
    const cfg=DEPTH_CONFIG[S.depth]||DEPTH_CONFIG['标准'];
    const categoryKey=CATEGORY_BY_LABEL[S.kb]||CATEGORY_BY_LABEL[S.intent]||null;
    const r=await fetch(CFG.QUERY,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.token},
      body:JSON.stringify({
        question:text,
        category_key:categoryKey,
        limit:cfg.limit,
        depth:cfg.depth,
        use_llm:true
      })
    });
    const contentType=r.headers.get('content-type')||'';
    const data=contentType.includes('application/json')?await r.json():{error:await r.text()};
    if(r.status===401){
      S.token=null;
      sessionStorage.removeItem('access_code');
      showGate('访问码不正确，请重新输入');
      return;
    }
    if(!r.ok)throw new Error(data.error||'生成失败，请稍后重试');
    const sources=(data.sources||[]).map(s=>({
      category:s.category||S.kb||'知识库',
      score:s.source_number?'来源 '+s.source_number:'命中',
      excerpt:[s.title,s.source_path].filter(Boolean).join(' · ')||'已命中相关知识片段'
    }));
    clearTimeout(coldT);renderAnswer(loadEl,data.answer,sources,data.request_id);
  }catch(e){
    clearTimeout(coldT);
    const c=loadEl.querySelector('.ai-content');
    if(c)c.innerHTML=`<div style="color:var(--red);font-size:13px">请求失败，请重试。${esc(e.message||'')}</div>`;
  }finally{sendBtn.disabled=false;scrollBottom();}
}

sendBtn.addEventListener('click',submit);
document.getElementById('clearBtn').addEventListener('click',()=>{
  chatArea.innerHTML='';chatArea.appendChild(emptyState);emptyState.style.display='flex';
});
</script>
</body>
</html>
