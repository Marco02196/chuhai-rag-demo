<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Northstar Analytics · 运营看板</title>
<style>
:root{
  --bg:#f4f6fa;
  --panel:#ffffff;
  --panel-soft:#f8fafc;
  --ink:#111827;
  --body:#374151;
  --muted:#6b7280;
  --faint:#9ca3af;
  --line:#e5e7eb;
  --line-strong:#d1d5db;
  --blue:#3159e8;
  --blue-soft:#eef3ff;
  --green:#087f5b;
  --green-soft:#e9f8f2;
  --red:#c92a2a;
  --red-soft:#fff1f1;
  --amber:#b7791f;
  --amber-soft:#fff7e6;
  --radius:8px;
  --shadow:0 1px 2px rgba(15,23,42,.05),0 14px 36px rgba(15,23,42,.06);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{min-height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55}
button,input{font:inherit}
.hidden{display:none!important}
.auth-shell{min-height:100vh;display:grid;place-items:center;padding:24px}
.auth-card{width:min(420px,100%);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px;box-shadow:var(--shadow)}
.auth-logo{width:44px;height:44px;border-radius:10px;background:var(--ink);color:white;display:grid;place-items:center;font-weight:800;margin-bottom:18px}
.auth-card h1{font-size:24px;line-height:1.2;margin:0}
.auth-card p{color:var(--muted);margin:8px 0 20px}
.auth-row{display:flex;gap:10px}
.auth-row input{min-width:0;flex:1;height:42px;border:1px solid var(--line-strong);border-radius:8px;padding:0 12px;color:var(--ink);background:#fff}
.btn{height:36px;border:1px solid transparent;border-radius:8px;background:var(--blue);color:#fff;font-weight:700;padding:0 14px;cursor:pointer;white-space:nowrap}
.btn.secondary{background:#fff;color:var(--body);border-color:var(--line-strong)}
.btn.ghost{height:30px;background:var(--blue-soft);border-color:#dbe4ff;color:var(--blue);font-size:12px}
.btn:disabled{opacity:.55;cursor:not-allowed}
.err{min-height:20px;margin-top:12px;color:var(--red);font-size:13px}
.app{max-width:1280px;margin:0 auto;padding:24px}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:18px}
.eyebrow{font-size:12px;font-weight:700;color:var(--blue);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.title{font-size:30px;line-height:1.15;font-weight:800;margin:0}
.subtitle{color:var(--muted);margin-top:8px;max-width:680px}
.status{display:flex;align-items:center;gap:8px;color:var(--muted);border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.layout{display:grid;grid-template-columns:minmax(0,1.4fr) 360px;gap:16px}
.metrics{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 13px}
.metric-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.metric-value{font-size:25px;line-height:1;font-weight:800;letter-spacing:0}
.metric-note{font-size:12px;color:var(--faint);margin-top:8px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.panel + .panel{margin-top:16px}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 16px 12px;border-bottom:1px solid var(--line)}
.panel-title{font-size:16px;font-weight:800}
.panel-sub{font-size:12px;color:var(--muted)}
.panel-body{padding:12px 16px 16px}
.data-list{display:flex;flex-direction:column}
.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;padding:13px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}
.question{font-size:14px;color:var(--ink);line-height:1.55}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--panel-soft);border-radius:999px;padding:3px 8px;color:var(--muted);font-size:12px;line-height:1.2}
.tag.high{background:var(--amber-soft);border-color:#f0d39a;color:var(--amber)}
.tag.bad{background:var(--red-soft);border-color:#ffd4d4;color:var(--red)}
.tag.good{background:var(--green-soft);border-color:#cceedd;color:var(--green)}
.bars{display:flex;flex-direction:column;gap:11px}
.bar-row{display:grid;grid-template-columns:112px minmax(0,1fr) 34px;gap:10px;align-items:center;color:var(--muted);font-size:13px}
.bar-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar{height:8px;background:#edf1f6;border-radius:999px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#3159e8,#6b8dff)}
.bar-count{text-align:right;font-weight:700;color:var(--body)}
.empty{padding:24px;border:1px dashed var(--line-strong);border-radius:8px;background:var(--panel-soft);color:var(--muted);text-align:center}
.side-stack{display:flex;flex-direction:column;gap:16px}
.workflow{border-left:3px solid var(--blue);padding-left:12px}
.action-area{display:flex;align-items:center;justify-content:flex-end}
.reason-list .row{grid-template-columns:minmax(0,1fr)}
.footer-note{margin-top:14px;color:var(--faint);font-size:12px}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(3,1fr)}.side-stack{display:grid;grid-template-columns:1fr 1fr}}
@media(max-width:720px){.app{padding:16px}.topbar{flex-direction:column}.metrics{grid-template-columns:repeat(2,1fr)}.side-stack{display:flex}.row{grid-template-columns:1fr}.action-area{justify-content:flex-start}.title{font-size:25px}}
@media(max-width:440px){.metrics{grid-template-columns:1fr}.auth-row{flex-direction:column}.btn{width:100%}}
</style>
</head>
<body>
<div id="auth" class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">N</div>
    <h1>Northstar Analytics</h1>
    <p>查看真实提问、低命中问题、负反馈原因和待补知识卡。</p>
    <div class="auth-row">
      <input id="code" placeholder="输入访问码" autocomplete="current-password" />
      <button class="btn" id="enter">进入</button>
    </div>
    <div class="err" id="err"></div>
  </div>
</div>

<main id="app" class="app hidden">
  <header class="topbar">
    <div>
      <div class="eyebrow">Northstar Analytics</div>
      <h1 class="title">运营看板</h1>
      <div class="subtitle">把真实用户问题变成知识库迭代队列。重点看低命中、负反馈和待补知识卡。</div>
    </div>
    <div class="status"><span class="dot"></span><span id="updated">等待加载</span></div>
  </header>

  <section class="metrics" id="metrics"></section>

  <section class="layout">
    <div>
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">最近真实问题</div>
            <div class="panel-sub">优先观察真实表达和高频业务词</div>
          </div>
        </div>
        <div class="panel-body"><div class="data-list" id="recent"></div></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">低命中问题</div>
            <div class="panel-sub">引用数低的问题，适合直接转成待补知识卡</div>
          </div>
        </div>
        <div class="panel-body"><div class="data-list" id="lowSources"></div></div>
      </section>
    </div>

    <aside class="side-stack">
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">待补知识卡</div>
            <div class="panel-sub">当前知识库迭代队列</div>
          </div>
        </div>
        <div class="panel-body"><div class="data-list" id="todos"></div></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">分类分布</div>
            <div class="panel-sub">用户问题集中在哪类</div>
          </div>
        </div>
        <div class="panel-body"><div class="bars" id="categories"></div></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">负反馈原因</div>
            <div class="panel-sub">点踩后的改进方向</div>
          </div>
        </div>
        <div class="panel-body"><div class="bars" id="feedbackReasons"></div></div>
      </section>
    </aside>
  </section>

  <section class="panel" style="margin-top:16px">
    <div class="panel-head">
      <div>
        <div class="panel-title">负反馈明细</div>
        <div class="panel-sub">用于判断是知识缺口、检索偏差，还是回答太空泛</div>
      </div>
    </div>
    <div class="panel-body"><div class="data-list reason-list" id="negative"></div></div>
  </section>
</main>

<script>
const $=id=>document.getElementById(id);
const params=new URLSearchParams(location.search);
const saved=sessionStorage.getItem('admin_code')||params.get('code')||'';
$('code').value=saved;

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function fmtTime(v){try{return new Date(v).toLocaleString('zh-CN',{hour12:false});}catch{return v||''}}
function metric(label,value,note='',cls=''){return `<div class="metric"><div class="metric-label">${esc(label)}</div><div class="metric-value ${cls}">${esc(value)}</div><div class="metric-note">${esc(note)}</div></div>`}
function meta(items){return `<div class="meta">${items.filter(Boolean).map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div>`}
function empty(text){return `<div class="empty">${esc(text)}</div>`}
function row(q,m=[],action=''){return `<div class="row"><div><div class="question">${esc(q||'')}</div>${meta(m)}</div>${action?`<div class="action-area">${action}</div>`:''}</div>`}
function renderBars(el, rows, key){
  const max=Math.max(1,...rows.map(r=>r.count||0));
  el.innerHTML=rows.length?rows.map(r=>`<div class="bar-row"><span class="bar-name">${esc(r[key]||'unknown')}</span><div class="bar"><i style="width:${Math.max(6,(r.count||0)/max*100)}%"></i></div><span class="bar-count">${r.count||0}</span></div>`).join(''):empty('暂无数据');
}
async function createTodo(x,btn){
  const code=$('code').value.trim();
  btn.disabled=true;
  btn.textContent='提交中';
  const res=await fetch('/api/admin/todos',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+code},
    body:JSON.stringify({request_id:x.request_id,question:x.question,category_key:x.category_key,source_count:x.source_count,note:'来自低命中问题',priority:'high'})
  });
  if(!res.ok){btn.disabled=false;btn.textContent='加入待补';alert('创建待办失败，稍后重试');return}
  await load();
}
function lowRow(x){
  const id='todo_'+String(x.request_id||Math.random()).replace(/[^a-zA-Z0-9_]/g,'_');
  setTimeout(()=>{const b=$(id);if(b)b.onclick=()=>createTodo(x,b)},0);
  return row(x.question,[x.category_key||'unknown',`引用 ${x.source_count??0}`,fmtTime(x.created_at)],`<button class="btn ghost" id="${id}">加入待补</button>`);
}
function renderRows(el, rows, mapper, emptyText){el.innerHTML=rows.length?rows.map(mapper).join(''):empty(emptyText)}
async function load(){
  const code=$('code').value.trim();
  if(!code){$('err').textContent='请输入访问码';return}
  $('err').textContent='';
  const res=await fetch('/api/admin/analytics',{headers:{Authorization:'Bearer '+code}});
  if(!res.ok){$('err').textContent='访问码不正确或后台暂不可用';return}
  sessionStorage.setItem('admin_code',code);
  const d=await res.json();
  const t=d.totals||{};
  $('auth').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('metrics').innerHTML=[
    metric('累计问题',t.questions||0,'真实用户提问'),
    metric('平均耗时',`${t.avg_elapsed_ms||0} ms`,'接口响应'),
    metric('平均引用',t.avg_source_count||0,'每次回答来源'),
    metric('有用反馈',t.feedback_up||0,'正向信号','ok'),
    metric('负反馈',t.feedback_down||0,'需要复盘','danger'),
    metric('待补知识卡',t.open_todos||0,'开放任务','warn')
  ].join('');
  $('updated').textContent='更新于 '+fmtTime(d.generated_at);
  renderRows($('recent'),d.recent_questions||[],x=>row(x.question,[x.category_key||'unknown',x.depth||'standard',`引用 ${x.source_count??0}`,fmtTime(x.created_at)]),'暂无真实问题');
  renderRows($('lowSources'),d.low_source_questions||[],lowRow,'暂无低命中问题');
  renderRows($('todos'),d.knowledge_todos||[],x=>row(x.question,[x.category_key||'unknown',x.priority||'medium',x.status||'open',fmtTime(x.created_at)]),'暂无待补知识卡');
  renderRows($('negative'),d.negative_feedback||[],x=>row(x.answer_preview||x.request_id,[x.reason||'未填原因',fmtTime(x.created_at)]),'暂无负反馈');
  renderBars($('categories'),d.by_category||[],'category_key');
  renderBars($('feedbackReasons'),d.feedback_reasons||[],'reason');
}
$('enter').addEventListener('click',load);
$('code').addEventListener('keydown',e=>{if(e.key==='Enter')load()});
if(saved)load();
</script>
</body>
</html>
